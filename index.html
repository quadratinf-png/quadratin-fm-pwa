<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0F1322">
    <title>Quadratin FM</title>
    
    <!-- Fuentes e Iconos -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Estilos de la PWA -->
    <link rel="stylesheet" href="style.css?v=3">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <!-- Background Image -->
    <div class="bg-overlay"></div>

    <!-- MAIN APP CONTAINER -->
    <div class="app-container">
        
        <!-- HEADER -->
        <header class="header">
            <h1 class="header-title">QUADRATIN FM</h1>
            <div class="live-badge">● EN VIVO</div>
        </header>

        <!-- VIEW: RADIO -->
        <div id="view-radio" class="view active">
            <div class="logo-container">
                <img src="logo.png" alt="Quadratin FM Logo" class="main-logo" id="main-logo">
            </div>

            <!-- Fake Visualizer -->
            <div class="visualizer" id="visualizer">
                <!-- Bars generated by JS -->
            </div>

            <div class="status-text" id="status-text">En vivo</div>

            <!-- Player Controls -->
            <div class="player-controls">
                <button class="btn-icon" id="btn-favorite"><i class="fa-regular fa-heart"></i></button>
                <button class="btn-play" id="btn-play"><i class="fa-solid fa-play"></i></button>
                <button class="btn-icon" id="btn-share"><i class="fa-solid fa-share-nodes"></i></button>
            </div>
            
            <audio id="radio-audio" preload="none">
                <source src="https://stream.zeno.fm/tinswh8fii0tv" type="audio/mpeg">
            </audio>
        </div>

        <!-- VIEW: CHAT -->
        <div id="view-chat" class="view">
            <div class="chat-header">
                <h2>Chat en Vivo</h2>
            </div>
            <div class="chat-messages" id="chat-messages">
                <!-- Messages go here -->
            </div>
            <div class="chat-input-container">
                <div class="input-row">
                    <input type="text" id="chat-message" placeholder="Escribe un mensaje..." class="chat-input message-input">
                    <button id="btn-send" class="btn-send"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <!-- VIEW: PROFILE -->
        <div id="view-profile" class="view">
            <div class="chat-header">
                <h2>Mi Perfil</h2>
            </div>
            <div class="profile-container">
                <div class="profile-avatar">
                    <i class="fa-solid fa-user"></i>
                </div>
                <h3>Configura tu cuenta</h3>
                <p class="profile-desc">Tu nombre aparecerá en el chat público.</p>
                
                <div class="profile-form">
                    <label>Nombre de Usuario</label>
                    <input type="text" id="profile-nickname" placeholder="Ej. Juan Pérez" class="chat-input">
                    <button id="btn-save-profile" class="btn-primary">Guardar Perfil</button>
                </div>
            </div>
        </div>

    </div>

    <!-- BOTTOM NAVIGATION -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item active" data-target="view-radio">
            <i class="fa-solid fa-radio"></i>
            <span>En Vivo</span>
        </a>
        <a href="#" class="nav-item" data-target="view-chat">
            <i class="fa-solid fa-comment-dots"></i>
            <span>Chat</span>
        </a>
        <a href="#" class="nav-item" data-target="view-profile">
            <i class="fa-solid fa-user"></i>
            <span>Perfil</span>
        </a>
    </nav>

    <!-- Main Logic -->
    <script src="app.js"></script>
</body>
</html>
